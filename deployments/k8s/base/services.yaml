apiVersion: v1
kind: Service
metadata:
  name: proxy-api-server
spec:
  type: ClusterIP
  selector:
    app: proxy-api-server
  ports:
    - name: http
      port: 80
      targetPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: admin-api-server
spec:
  type: ClusterIP
  selector:
    app: admin-api-server
  ports:
    - name: http
      port: 80
      targetPort: 80
