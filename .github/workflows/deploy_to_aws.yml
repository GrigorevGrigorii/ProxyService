name: Deploy Multiple Microservices to ECS

on:
  push:
    branches: ["master"]

env:
  AWS_REGION: ap-southeast-1
  AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
  AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
  ECS_CLUSTER: ProxyService

jobs:
  login-and-prepare:
    runs-on: ubuntu-latest
    outputs:
      registry: ${{ steps.login-ecr.outputs.registry }}
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ env.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ env.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Get ECR registry
        id: get-registry
        run: echo "registry=${{ steps.login-ecr.outputs.registry }}" >> $GITHUB_OUTPUT

  deploy-microservices:
    needs: login-and-prepare
    runs-on: ubuntu-latest
    strategy:
      matrix:
        microservice:
          - name: proxy-api-server
            context: .
            dockerfile: ./build/package/Dockerfile
            ecr-repo: proxy-service/proxy-api-server
            task-def: ./deployments/aws-ecs-task-definitions/proxy-api-server.json
            container-name: Main
            build-args: '--build-arg SERVICE=proxy-api-server --build-arg PORT=80'
            target: api-server
          - name: admin-api-server
            context: .
            dockerfile: ./build/package/Dockerfile
            ecr-repo: proxy-service/admin-api-server
            task-def: ./deployments/aws-ecs-task-definitions/admin-api-server.json
            container-name: Main
            build-args: '--build-arg SERVICE=admin-api-server --build-arg PORT=80'
            target: api-server
          - name: background-worker-2
            context: .
            dockerfile: ./build/package/Dockerfile
            ecr-repo: proxy-service/background-worker
            task-def: ./deployments/aws-ecs-task-definitions/background-worker.json
            container-name: Main
            build-args: '--build-arg SERVICE=background-worker'
            target: background
          - name: background-scheduler-2
            context: .
            dockerfile: ./build/package/Dockerfile
            ecr-repo: proxy-service/background-scheduler
            task-def: ./deployments/aws-ecs-task-definitions/background-scheduler.json
            container-name: Main
            build-args: '--build-arg SERVICE=background-scheduler'
            target: background
      fail-fast: false

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ env.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ env.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push ${{ matrix.microservice.name }}
        id: build-image
        env:
          ECR_REGISTRY: ${{ needs.login-and-prepare.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build \
            -f ${{ matrix.microservice.dockerfile }} \
            -t $ECR_REGISTRY/${{ matrix.microservice.ecr-repo }}:$IMAGE_TAG \
            ${{ matrix.microservice.build-args }} \
            --target ${{ matrix.microservice.target }} \
            ${{ matrix.microservice.context }}

          docker push $ECR_REGISTRY/${{ matrix.microservice.ecr-repo }}:$IMAGE_TAG
          echo "image=$ECR_REGISTRY/${{ matrix.microservice.ecr-repo }}:$IMAGE_TAG" >> $GITHUB_OUTPUT

      - name: Render task definition for ${{ matrix.microservice.name }}
        id: render-task
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: ${{ matrix.microservice.task-def }}
          container-name: ${{ matrix.microservice.container-name }}
          image: ${{ steps.build-image.outputs.image }}

      - name: Deploy ${{ matrix.microservice.name }} to ECS
        uses: aws-actions/amazon-ecs-deploy-task-definition@v1
        with:
          task-definition: ${{ steps.render-task.outputs.task-definition }}
          service: ${{ matrix.microservice.name }}
          cluster: ${{ env.ECS_CLUSTER }}
          wait-for-service-stability: true
