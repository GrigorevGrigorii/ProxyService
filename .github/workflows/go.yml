# This workflow will build a golang project
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-go

name: Go

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:

  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v4
      with:
        go-version: '1.25'

    - name: Build proxy-api-server
      run: go build -v cmd/proxy-api-server/main.go

    - name: Build mock-api-server
      run: go build -v cmd/mock-api-server/main.go

    - name: Build admin-api-server
      run: go build -v cmd/admin-api-server/main.go

    - name: Build background-worker
      run: go build -v cmd/background-worker/main.go

    - name: Build background-scheduler
      run: go build -v cmd/background-scheduler/main.go

    - name: Test
      run: go test -v ./...
