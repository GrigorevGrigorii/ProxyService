# Compose file to run containers for local testing of the service
name: proxy-service
services:
  proxy:
    container_name: proxy-api-server
    build:
      context: ..
      dockerfile: build/package/Dockerfile
      args:
        SERVICE: proxy-api-server
        PORT: 8080
    volumes:
      - ../configs:/app/configs:ro
    ports:
      - 127.0.0.1:8080:8080
    depends_on:
      postgres:
        condition: service_healthy
        restart: true
      redis:
        condition: service_healthy
        restart: true
  admin:
    container_name: admin-api-server
    build:
      context: ..
      dockerfile: build/package/Dockerfile
      args:
        SERVICE: admin-api-server
        PORT: 8082
    volumes:
      - ../configs:/app/configs:ro
    ports:
      - 127.0.0.1:8082:8082
    depends_on:
      postgres:
        condition: service_healthy
        restart: true
  mock:
    container_name: mock-api-server
    build:
      context: ..
      dockerfile: build/package/Dockerfile
      args:
        SERVICE: mock-api-server
        PORT: 8081
    volumes:
      - ../configs:/app/configs:ro
    ports:
      - 127.0.0.1:8081:8081
  postgres:
    image: postgres:latest
    container_name: postgres-container
    environment:
      POSTGRES_USER: proxy_service_user
      POSTGRES_PASSWORD: proxy_service_password
      POSTGRES_DB: proxy_service_db
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "5432:5432"
    volumes:
      - ./pgdata:/var/lib/postgresql/data/pgdata
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U proxy_service_user -d proxy_service_db" ]
      interval: 30s
      timeout: 10s
      retries: 5
    restart: unless-stopped
  redis:
    image: redis:latest
    container_name: redis-container
    command: redis-server --requirepass proxy_service_password --appendonly yes
    environment:
       REDIS_PASSWORD: proxy_service_password
    ports:
      - "6379:6379"
    volumes:
      - ./redisdata:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a proxy_service_password ping"]
      interval: 30s
      timeout: 10s
      retries: 5
    restart: unless-stopped

volumes:
  pgdata:
    driver: local
  redisdata:
    driver: local
